<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_7 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_7" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_7');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const spotLight = new THREE.SpotLight(0xf97316, 2);
spotLight.position.set(5, 5, 5);
scene.add(spotLight);

const blueLight = new THREE.PointLight(0x00a2f4, 1);
blueLight.position.set(-5, -2, 2);
scene.add(blueLight);

// Complex Technical Foam Block (Composite Geometry)
const group = new THREE.Group();

const mainBoxGeom = new THREE.BoxGeometry(3, 2, 1);
const material = new THREE.MeshPhongMaterial({ 
  color: 0xeeeeee, 
  transparent: true, 
  opacity: 0.9,
  shininess: 100
});

const mainBlock = new THREE.Mesh(mainBoxGeom, material);
group.add(mainBlock);

// Technical "Exploded" Wireframe
const wireframe = new THREE.LineSegments(
  new THREE.EdgesGeometry(mainBoxGeom),
  new THREE.LineBasicMaterial({ color: 0xf97316, transparent: true, opacity: 0.5 })
);
wireframe.scale.set(1.1, 1.1, 1.1);
group.add(wireframe);

// Internal "Cellular" Spheres (representing EPE structure)
for(let i = 0; i < 20; i++) {
  const sphereGeom = new THREE.SphereGeometry(0.15, 8, 8);
  const sphere = new THREE.Mesh(sphereGeom, material);
  sphere.position.set(
    (Math.random() - 0.5) * 2.8,
    (Math.random() - 0.5) * 1.8,
    (Math.random() - 0.5) * 0.8
  );
  group.add(sphere);
}

scene.add(group);
camera.position.z = 5;

let mouseX = 0;
let mouseY = 0;

window.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

function animate() {
  requestAnimationFrame(animate);
  
  group.rotation.y += 0.005;
  group.rotation.x += (mouseY * 0.5 - group.rotation.x) * 0.05;
  group.rotation.y += (mouseX * 0.5 - group.rotation.y) * 0.05;
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_7 -->
</body>
</html>
